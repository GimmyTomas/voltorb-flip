<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voltorb Flip Solver</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Voltorb Flip</h1>
            <div class="header-right">
                <a href="algorithm.html" class="header-link">How It Works</a>
                <div class="mode-toggle">
                    <button id="assistantModeBtn" class="mode-btn active">Assistant</button>
                    <button id="playModeBtn" class="mode-btn">Play</button>
                </div>
            </div>
        </header>

        <main>
            <div class="game-area">
                <!-- Game Board -->
                <div class="board-container">
                    <div class="board-grid">
                        <!-- 5x5 grid of tiles -->
                        <div class="tiles-area">
                            <!-- Tiles will be generated by JS -->
                        </div>

                        <!-- Column hints (bottom) -->
                        <div class="col-hints">
                            <!-- 5 column hint panels -->
                        </div>
                    </div>

                    <!-- Row hints (right side) -->
                    <div class="row-hints">
                        <!-- 5 row hint panels -->
                    </div>
                </div>

                <!-- Side Panel -->
                <div class="side-panel">
                    <div class="panel-section level-section">
                        <label for="levelSelect">Level:</label>
                        <select id="levelSelect">
                            <option value="1" selected>Level 1</option>
                            <option value="2">Level 2</option>
                            <option value="3">Level 3</option>
                            <option value="4">Level 4</option>
                            <option value="5">Level 5</option>
                            <option value="6">Level 6</option>
                            <option value="7">Level 7</option>
                            <option value="8">Level 8</option>
                        </select>
                    </div>

                    <div class="panel-section controls-section">
                        <button id="newGameAssistantBtn" class="control-btn">New Game</button>
                        <button id="undoBtn" class="control-btn" disabled>Undo</button>
                        <button id="resetBtn" class="control-btn">Reset</button>
                    </div>

                    <div class="panel-section selfplay-controls" style="display: none;">
                        <button id="selfPlayBtn" class="control-btn">Self-Play</button>
                        <div class="speed-control">
                            <label for="speedSlider">Speed:</label>
                            <input type="range" id="speedSlider" min="1" max="10" value="5">
                        </div>
                    </div>

                    <div class="panel-section stats-section">
                        <div class="stats-label">Statistics</div>
                        <div class="stats-row">
                            <span>Games:</span>
                            <span id="gamesPlayed">0</span>
                        </div>
                        <div class="stats-row">
                            <span>Wins:</span>
                            <span id="gamesWon">0</span>
                        </div>
                        <div class="stats-row">
                            <span>Win Rate:</span>
                            <span id="winRate">--</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Solver Panel (below board) -->
            <div class="solver-panel">
                <div class="solver-panel-left">
                    <div class="solve-buttons">
                        <button id="solveBtn" class="control-btn solver-btn">Solve</button>
                        <button id="autoSolveBtn" class="control-btn solver-btn">Auto</button>
                    </div>

                    <div class="win-prob-section">
                        <div class="win-prob-label">Win Probability</div>
                        <div class="win-prob-value" id="winProbValue">--</div>
                        <div class="win-prob-bar">
                            <div class="win-prob-fill" id="winProbFill"></div>
                        </div>
                    </div>

                    <div class="suggestion-section">
                        <div class="suggestion-label">Suggested Move</div>
                        <div class="suggestion-value" id="suggestionValue">--</div>
                    </div>
                </div>

                <div class="solver-panel-center">
                    <div class="solver-info-row">
                        <span>Compatible Boards:</span>
                        <span id="compatibleCount">--</span>
                    </div>
                    <div class="board-types-container">
                        <div class="board-types-label">Board Type Probabilities</div>
                        <div class="board-types-list" id="boardTypesList">
                            <!-- Board type probabilities will be populated by JS -->
                        </div>
                    </div>
                </div>

                <div class="solver-panel-right">
                    <div class="prob-toggle">
                        <span class="prob-toggle-label">Display:</span>
                        <button id="probDetailedBtn" class="prob-toggle-btn">Detailed</button>
                        <button id="probVoltorbBtn" class="prob-toggle-btn active">Voltorb</button>
                        <button id="probNoneBtn" class="prob-toggle-btn">None</button>
                    </div>
                    <div class="legend-section" id="legendSection">
                        <div class="legend-title">Probability Legend</div>
                        <div class="legend-item">
                            <div class="legend-color safe"></div>
                            <span>Safe (0% Voltorb)</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color low-risk"></div>
                            <span>Low Risk (&lt;25%)</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color medium-risk"></div>
                            <span>Medium (25-50%)</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color high-risk"></div>
                            <span>High Risk (&gt;50%)</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Tile Input Modal -->
        <div class="modal" id="tileModal" style="display: none;">
            <div class="modal-content">
                <div class="modal-title">Reveal Tile</div>
                <div class="modal-buttons">
                    <button class="tile-value-btn voltorb" data-value="0">
                        <div class="voltorb-icon"></div>
                    </button>
                    <button class="tile-value-btn one" data-value="1">1</button>
                    <button class="tile-value-btn two" data-value="2">2</button>
                    <button class="tile-value-btn three" data-value="3">3</button>
                </div>
                <button class="modal-cancel" id="modalCancel">Cancel</button>
            </div>
        </div>

        <!-- Hint Edit Modal -->
        <div class="modal" id="hintModal" style="display: none;">
            <div class="modal-content">
                <div class="modal-title">Edit Hint</div>
                <div class="hint-inputs">
                    <div class="hint-input-group">
                        <label>Sum:</label>
                        <input type="number" id="hintSum" min="0" max="15" value="0">
                    </div>
                    <div class="hint-input-group">
                        <label>Voltorbs:</label>
                        <input type="number" id="hintVoltorbs" min="0" max="5" value="0">
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="modal-ok" id="hintOk">OK</button>
                    <button class="modal-cancel" id="hintCancel">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Game Over Modal -->
        <div class="modal" id="gameOverModal" style="display: none;">
            <div class="modal-content game-over">
                <div class="modal-title" id="gameOverTitle">Game Over</div>
                <div class="game-over-message" id="gameOverMessage"></div>
                <button class="control-btn" id="gameOverOk">OK</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
